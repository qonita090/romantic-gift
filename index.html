<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Romantic Space-Themed Gift</title>
    <style>
        body {
            background: url('space-background.jpg') no-repeat center center fixed;
            background-size: cover;
            color: white;
            font-family: 'Arial', sans-serif;
            text-align: center;
        }
        h1 {
            margin-top: 50px;
            font-size: 3em;
        }
        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            animation: twinkling 1.5s infinite;
        }
        @keyframes twinkling {
            0% { opacity: 0.7; }
            50% { opacity: 1; }
            100% { opacity: 0.7; }
        }
    </style>
</head>
<body>
    <h1>Love Among the Stars</h1>
    <p>“In the vast universe, my love for you shines brighter than all the stars.”</p>
    <p>“You're my universe, my beautiful galaxy.”</p>
    <div id="stars"></div>
    <script>
        const createStar = () => {
            const star = document.createElement('div');
            star.className = 'star';
            const size = Math.random() * 3 + 1;
            star.style.width = `${size}px`;
            star.style.height = `${size}px`;
            star.style.top = `${Math.random() * 100}vh`;
            star.style.left = `${Math.random() * 100}vw`;
            document.getElementById('stars').appendChild(star);
            setTimeout(() => star.remove(), 2000);
        };
        setInterval(createStar, 300);
    </script>
</body>
</html>
