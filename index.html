<!DOCTYPE html>\n<html lang=\"en\">\n<head>\n    <meta charset=\"UTF-8\">\n    <meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0\">\n    <title>Personalized Message</title>\n    <style>\n        body {\n            margin: 0;\n            overflow: hidden;\n            display: flex;\n            justify-content: center;\n            align-items: center;\n            height: 100vh;\n            background: black;\n            position: relative;\n        }\n        .message {\n            color: white;\n            font-size: 2em;\n            position: absolute;\n            opacity: 0;\n            animation: fadeInOut 10s infinite;\n        }\n        @keyframes fadeInOut {\n            0% { opacity: 0; }\n            10% { opacity: 1; }\n            40% { opacity: 1; }\n            50% { opacity: 0; }\n            100% { opacity: 0; }\n        }\n        .star {\n            position: absolute;\n            top: 0;\n            left: 0;\n            width: 100%;\n            height: 100%;\n            background: transparent;\n            overflow: hidden;\n        }\n        .star:before {\n            content: '';\n            position: absolute;\n            top: 50%;\n            left: 50%;\n            width: 100%;\n            height: 100%;\n            background: radial-gradient(circle closest-side, white, transparent);\n            animation: twinkle 1.5s infinite;\n            transform: translate(-50%, -50%);\n            opacity: 0.5;\n        }\n        @keyframes twinkle {\n            0% { opacity: 0.5; }\n            50% { opacity: 1; }\n            100% { opacity: 0.5; }\n        }\n    </style>\n</head>\n<body>\n    <div class=\"star\"></div>\n    <div class=\"message\">haiii nita, semangat ya untuk menjalani kehidupan, im so proud of you, selalu jadi anak yang berbakti kepada orang tua ya....i love youuuu</div>\n</body>\n</html>\n
