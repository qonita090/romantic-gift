<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Romantic Space-Themed Website</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: url('https://example.com/space-background.jpg') no-repeat center center fixed;
            background-size: cover;
            color: white;
            text-align: center;
            animation: fadeIn 2s;
        }
        h1 {
            font-size: 3em;
            margin-top: 20%;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.7);
        }
        p {
            font-size: 1.5em;
            margin: 20px;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.5);
        }
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        .message {
            margin-top: 50px;
            font-size: 1.2em;
            animation: bounce 1.5s infinite;
        }
        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% {
                transform: translateY(0);
            }
            40% {
                transform: translateY(-20px);
            }
            60% {
                transform: translateY(-10px);
            }
        }
    </style>
</head>
<body>
    <h1>Journey Among the Stars</h1>
    <p>Explore the universe together, lost in the beauty of the cosmos.</p>
    <div class="message">"You are my universe, my infinite love."</div>
</body>
</html>
