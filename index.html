<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Romantic Gift</title>
    <style>
        /* Space background */
        body {
            margin: 0;
            height: 100vh;
            overflow: hidden;
            background: url('your-space-background-image-url') no-repeat center center fixed;
            background-size: cover;
        }
        .message {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            font-size: 24px;
            text-align: center;
            animation: fadeIn 3s;
        }
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        /* Animated planets */
        .planet {
            position: absolute;
            border-radius: 50%;
            animation: orbit 10s linear infinite;
        }
        @keyframes orbit {
            0% { transform: translate(0, 0); }
            100% { transform: translate(300px, 300px); }
        }
    </style>
</head>
<body>
    <div class="message">
        haiii nita, semangat ya untuk menjalani kehidupan, im so proud of you, selalu jadi anak yang berbakti kepada orang tua ya....i love youuuu
    </div>
    <div class="planet" style="width: 50px; height: 50px; background-color: red; top: 10%; left: 20%; animation-duration: 5s;"></div>
    <div class="planet" style="width: 40px; height: 40px; background-color: blue; top: 30%; left: 50%; animation-duration: 7s;"></div>
    <div class="planet" style="width: 60px; height: 60px; background-color: green; top: 70%; left: 80%; animation-duration: 9s;"></div>
</body>
</html>
